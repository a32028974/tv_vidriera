<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pantalla Óptica Cristal</title>
    <style>
        /* Mismo CSS que antes, con el truco de rotación */
        :root { --bg: #000; --accent: #007bff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }

        #main-container {
            width: 1920px; height: 1080px;
            position: absolute; top: 0; left: 100%;
            transform: rotate(90deg); transform-origin: top left;
            display: flex; flex-direction: column;
        }

        header { height: 150px; display: flex; justify-content: space-around; align-items: center; background: #111; border-bottom: 4px solid var(--accent); }
        #clock { font-size: 90px; font-weight: bold; color: var(--accent); }
        #video-wrapper { flex-grow: 1; background: #000; display: flex; }
        video { width: 100%; height: 100%; object-fit: cover; }
        footer { height: 80px; background: var(--accent); overflow: hidden; display: flex; align-items: center; }
        .ticker { display: inline-block; white-space: nowrap; animation: move 20s linear infinite; font-size: 35px; font-weight: bold; }
        @keyframes move { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>
    <div id="main-container">
        <header>
            <div id="clock">00:00</div>
            <div id="weather" style="font-size: 30px;">San Miguel <span id="temp">--°C</span></div>
        </header>
        <div id="video-wrapper">
            <video id="player" muted playsinline></video>
        </div>
        <footer>
            <div class="ticker"> ⚡ BIENVENIDOS A ÓPTICA CRISTAL SAN MIGUEL - LAS MEJORES MARCAS AL MEJOR PRECIO ⚡ </div>
        </footer>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxpYBcuSBJCkmCq6FPluaCZaTA0ESezmi_rndYNyMCXID9bDYkscZkRlCC9fl5VJmqf1A/exec';
        let videoList = [];
        let currentIndex = 0;
        const player = document.getElementById('player');

        async function loadVideos() {
            try {
                const response = await fetch(SCRIPT_URL);
                videoList = await response.json();
                if (videoList.length > 0) playVideo();
            } catch (e) { console.error("Error cargando lista", e); }
        }

        function playVideo() {
            const id = videoList[currentIndex];
            player.src = `https://drive.google.com/uc?export=download&id=${id}`;
            player.play();
            currentIndex = (currentIndex + 1) % videoList.length;
        }

        player.onended = () => {
            // Cada vez que termina un ciclo, refrescamos la lista por si subiste videos nuevos
            if (currentIndex === 0) loadVideos(); 
            else playVideo();
        };

        // Reloj
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }, 1000);

        // Clima
        async function getWeather() {
            const res = await fetch('https://wttr.in/San+Miguel,Argentina?format=%t');
            document.getElementById('temp').innerText = await res.text();
        }

        window.onload = () => {
            loadVideos();
            getWeather();
            setInterval(getWeather, 600000);
        };
    </script>
</body>
</html>
