<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Óptica Cristal - Vidriera</title>
    <style>
        :root {
            --azul-optica: #007bff;
            --negro-fondo: #000000;
            --blanco: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--negro-fondo);
            color: var(--blanco);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* CABECERA (Reloj y Clima) */
        header {
            height: 15vh;
            background: linear-gradient(180deg, #1a1a1a 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-bottom: 4px solid var(--azul-optica);
            text-align: center;
        }

        #clock {
            font-size: 12vw; /* Grande para que se vea de lejos */
            font-weight: bold;
            line-height: 1;
            color: var(--azul-optica);
        }

        #weather {
            font-size: 5vw;
            margin-top: 5px;
        }

        /* REPRODUCTOR DE VIDEO (Ocupa el centro) */
        #video-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Para que el video llene el ancho vertical */
        }

        /* BANNER DE NOTICIAS (Abajo) */
        footer {
            height: 8vh;
            background: var(--azul-optica);
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .ticker {
            white-space: nowrap;
            font-size: 5vh;
            font-weight: bold;
            text-transform: uppercase;
            animation: marquee 20s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

    <header>
        <div id="clock">00:00</div>
        <div id="weather">San Miguel <span id="temp">--°</span></div>
    </header>

    <div id="video-container">
        <video id="player" muted playsinline></video>
    </div>

    <footer>
        <div class="ticker" id="noticias">
            +++ ÓPTICA CRISTAL SAN MIGUEL +++ LAS MEJORES MARCAS +++ CUOTAS SIN INTERÉS +++ LENTES DE CONTACTO +++ 
        </div>
    </footer>

    <script>
        // 1. CONEXIÓN CON TU GOOGLE DRIVE (Vía Apps Script)
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxpYBcuSBJCkmCq6FPluaCZaTA0ESezmi_rndYNyMCXID9bDYkscZkRlCC9fl5VJmqf1A/exec

'; 
        
        let videoList = [];
        let currentIndex = 0;
        const player = document.getElementById('player');

        async function cargarVideos() {
            try {
                const response = await fetch(SCRIPT_URL);
                videoList = await response.json();
                console.log("Videos encontrados:", videoList);
                if (videoList.length > 0) reproducir();
            } catch (error) {
                console.error("Error al cargar videos:", error);
                setTimeout(cargarVideos, 10000); // Reintenta cada 10 seg si falla
            }
        }

        function reproducir() {
            if (videoList.length === 0) return;
            
            const id = videoList[currentIndex];
            player.src = `https://drive.google.com/uc?export=download&id=${id}`;
            player.play().catch(e => console.log("Esperando interacción del usuario..."));
            
            currentIndex = (currentIndex + 1) % videoList.length;
        }

        player.onended = () => {
            // Si llegamos al final de la lista, volvemos a preguntar al script
            // por si agregaste videos nuevos a la carpeta de Drive
            if (currentIndex === 0) cargarVideos(); 
            else reproducir();
        };

        // 2. RELOJ
        function actualizarReloj() {
            const ahora = new Date();

            const m = String(ahora.getMinutes()).padStart(2, '0');
            document.getElementById('clock').innerText = `${h}:${m}`;
        }
        setInterval(actualizarReloj, 1000);
        actualizarReloj();

        // 3. CLIMA (San Miguel)
        async function actualizarClima() {
            try {
                const res = await fetch('https://wttr.in/San+Miguel,Argentina?format=%t');
                const t = await res.text();
                document.getElementById('temp').innerText = t;
            } catch (e) { 
                document.getElementById('temp').innerText = "--°"; 
            }
        }
        setInterval(actualizarClima, 900000); // Cada 15 min
        actualizarClima();

        // 4. INICIO AUTOMÁTICO
        window.onload = cargarVideos;

        // Si la TV bloquea el video por falta de interacción, un clic en cualquier lado lo activa
        document.body.addEventListener('click', () => player.play(), {once: true});
    </script>
</body>
</html>
