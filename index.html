<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vidriera Pro - Óptica Cristal</title>
    <style>
        :root { --azul: #007bff; --negro: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--negro); overflow: hidden; width: 100vw; height: 100vh; color: white; font-family: Arial, sans-serif; }

        #main-container {
            width: 1920px; height: 1080px;
            position: absolute; top: 0; left: 100%;
            transform: rotate(90deg); transform-origin: top left;
            display: flex; flex-direction: column; background: #000;
        }

        header { height: 160px; display: flex; justify-content: space-around; align-items: center; background: #111; border-bottom: 6px solid var(--azul); padding: 0 40px; }
        #clock { font-size: 100px; font-weight: bold; color: var(--azul); }
        #weather { font-size: 40px; text-align: right; min-width: 300px; }

        #media-wrapper { flex-grow: 1; background: #000; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center;}
        video, img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; display: none; }

        footer { height: 80px; background: var(--azul); display: flex; align-items: center; overflow: hidden; }
        .ticker { white-space: nowrap; font-size: 40px; font-weight: bold; animation: move 20s linear infinite; }
        @keyframes move { 0% { transform: translateX(100%); } 100% { transform: translateX(-150%); } }
    </style>
</head>
<body>

    <div id="main-container">
        <header>
            <div id="clock">00:00</div>
            <div id="weather">San Miguel <br> <span id="temp">--°C</span></div>
        </header>

        <div id="media-wrapper">
            <video id="player" muted autoplay playsinline></video>
            <img id="image-viewer"> 
        </div>

        <footer>
            <div class="ticker">
                +++ ÓPTICA CRISTAL SAN MIGUEL +++ LAS MEJORES MARCAS +++ EXAMEN VISUAL +++ LENTES DE CONTACTO +++
            </div>
        </footer>
    </div>

    <script>
        // CONFIGURACIÓN PRO
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxpYBcuSBJCkmCq6FPluaCZaTA0ESezmi_rndYNyMCXID9bDYkscZkRlCC9fl5VJmqf1A/exec';
        
        // ACÁ AGREGÁ LOS NOMBRES DE TUS VIDEOS EN GITHUB
        const misVideos = [
            'videos/mdq1.mp4'
        ];

        let fotosDrive = [];
        let listaFinal = [];
        let index = 0;
        let timer;
        
        const player = document.getElementById('player');
        const viewer = document.getElementById('image-viewer');

        async function armarLista() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                fotosDrive = data.filter(f => f.type === 'image');

                listaFinal = [];
                // Metemos los videos de GitHub
                misVideos.forEach(v => listaFinal.push({ tipo: 'video', url: v }));
                // Metemos las fotos de Drive
                fotosDrive.forEach(f => listaFinal.push({ tipo: 'foto', id: f.id, nombre: f.name }));

                if (listaFinal.length > 0) reproducir();
            } catch (e) { setTimeout(armarLista, 5000); }
        }

        function reproducir() {
            clearTimeout(timer);
            const actual = listaFinal[index];

            if (actual.tipo === 'video') {
                viewer.style.display = 'none';
                player.style.display = 'block';
                player.src = actual.url; // GitHub sirve el archivo directo
                player.play();
            } else {
                player.style.display = 'none';
                player.pause();
                viewer.style.display = 'block';
                viewer.src = `https://drive.google.com/thumbnail?id=${actual.id}&sz=w1920-h1080`;

                let ms = 10000;
                const match = actual.nombre.match(/img_(\d+)/);
                if (match) ms = parseInt(match[1]) * 1000;

                timer = setTimeout(siguiente, ms);
            }
        }

        function siguiente() {
            index++;
            if (index >= listaFinal.length) {
                index = 0;
                armarLista(); // Al terminar la vuelta, chequea si hay fotos nuevas en Drive
            } else {
                reproducir();
            }
        }

        player.onended = siguiente;

        // Reloj y Clima
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('es-AR', {hour: '2-digit', minute:'2-digit', hour12: false});
        }, 1000);

        async function getWeather() {
            try {
                const res = await fetch('https://wttr.in/San+Miguel,Argentina?format=%t');
                const t = await res.text();
                document.getElementById('temp').innerText = (t.length < 10) ? t.replace('+', '').trim() : "--°C";
            } catch (e) { }
        }

        window.onload = () => { armarLista(); getWeather(); setInterval(getWeather, 900000); };
    </script>
</body>
</html>
