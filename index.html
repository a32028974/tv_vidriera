<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Óptica Cristal Vidriera</title>
    <style>
        :root { --azul: #007bff; --negro: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--negro); overflow: hidden; 
            width: 100vw; height: 100vh; color: white; font-family: Arial, sans-serif;
        }

        #main-container {
            width: 1920px; height: 1080px;
            position: absolute; top: 0; left: 100%;
            transform: rotate(90deg); transform-origin: top left;
            display: flex; flex-direction: column; background: #000;
        }

        header { 
            height: 160px; display: flex; justify-content: space-around; 
            align-items: center; background: #111; border-bottom: 6px solid var(--azul); 
            padding: 0 40px; overflow: hidden;
        }
        
        #clock { font-size: 100px; font-weight: bold; color: var(--azul); }
        #weather { font-size: 40px; text-align: right; min-width: 300px; }

        #media-wrapper { flex-grow: 1; background: #000; position: relative; overflow: hidden; }
        video, img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; display: none; }

        footer { height: 80px; background: var(--azul); display: flex; align-items: center; overflow: hidden; }
        .ticker { 
            white-space: nowrap; font-size: 40px; font-weight: bold; 
            animation: move 20s linear infinite; 
        }
        @keyframes move { 0% { transform: translateX(100%); } 100% { transform: translateX(-150%); } }
    </style>
</head>
<body>

    <div id="main-container">
        <header>
            <div id="clock">00:00</div>
            <div id="weather">San Miguel <br> <span id="temp">--°C</span></div>
        </header>

        <div id="media-wrapper">
            <video id="player" muted autoplay playsinline></video>
            <img id="image-viewer" src="">
        </div>

        <footer>
            <div class="ticker">
                +++ ÓPTICA CRISTAL SAN MIGUEL +++ LAS MEJORES MARCAS +++ EXAMEN VISUAL +++ LENTES DE CONTACTO +++
            </div>
        </footer>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxpYBcuSBJCkmCq6FPluaCZaTA0ESezmi_rndYNyMCXID9bDYkscZkRlCC9fl5VJmqf1A/exec';
        let mediaList = [];
        let currentIndex = 0;
        const player = document.getElementById('player');
        const imgViewer = document.getElementById('image-viewer');

        async function cargarMedia() {
            try {
                const res = await fetch(SCRIPT_URL);
                mediaList = await res.json();
                console.log("Archivos encontrados:", mediaList);
                if (mediaList.length > 0 && player.style.display === '' && imgViewer.style.display === '') {
                    mostrarSiguiente(); // Arranca directo si es la primera vez
                }
            } catch (e) { 
                console.error("Error al cargar script (revisá tu fecha/hora o internet):", e);
                setTimeout(cargarMedia, 5000); 
            }
        }

        function mostrarSiguiente() {
            if (mediaList.length === 0) return;
            const item = mediaList[currentIndex];
            const url = `https://drive.google.com/uc?export=download&id=${item.id}`;

            if (item.type === 'video') {
                imgViewer.style.display = 'none';
                player.style.display = 'block';
                player.src = url;
                player.play().catch(e => console.log("La TV requiere habilitar autoplay en ajustes:", e));
            } else {
                player.style.display = 'none';
                player.pause();
                imgViewer.style.display = 'block';
                imgViewer.src = url;

                let segundos = 10;
                const match = item.name.match(/img_(\d+)/);
                if (match) segundos = parseInt(match[1]);

                setTimeout(proximoItem, segundos * 1000);
            }
        }

        function proximoItem() {
            currentIndex = (currentIndex + 1) % mediaList.length;
            if (currentIndex === 0) cargarMedia(); // Vuelve a leer Drive al terminar el ciclo
            else mostrarSiguiente();
        }

        player.onended = proximoItem;

        // Reloj
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('es-AR', {hour: '2-digit', minute:'2-digit', hour12: false});
        }, 1000);

        // Clima
        async function getWeather() {
            try {
                const res = await fetch('https://wttr.in/San+Miguel,Argentina?format=%t');
                const t = await res.text();
                if (t.length > 10 || t.includes('{') || t.includes('html')) {
                    document.getElementById('temp').innerText = "--°C";
                } else {
                    document.getElementById('temp').innerText = t.replace('+', '').trim();
                }
            } catch (e) { document.getElementById('temp').innerText = "--°C"; }
        }

        // Arranca todo al cargar la página
        window.onload = () => { 
            cargarMedia(); 
            getWeather(); 
            setInterval(getWeather, 900000); // Actualiza clima cada 15 min
        };
    </script>
</body>
</html>
