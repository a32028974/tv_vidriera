<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Óptica Cristal San Miguel</title>
    <style>
        :root { --azul: #007bff; --negro: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background: var(--negro); 
            overflow: hidden; 
            width: 100vw; 
            height: 100vh; 
        }

        /* ESTA PARTE GIRA TODO PARA QUE EN LA TELE SE VEA DERECHO */
        #main-container {
            width: 1920px; /* Largo de la tele */
            height: 1080px; /* Ancho de la tele */
            position: absolute;
            top: 0;
            left: 100%;
            transform: rotate(90deg);
            transform-origin: top left;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        /* CABECERA: Reduje el tamaño para que no se corte */
        header { 
            height: 180px; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            background: #111; 
            border-bottom: 6px solid var(--azul);
            padding: 0 40px;
        }

        #clock { font-size: 110px; font-weight: bold; color: var(--azul); }
        #weather { font-size: 45px; color: white; text-align: right; }

        /* VIDEO: Ahora ocupa el resto del espacio */
        #video-wrapper { flex-grow: 1; background: #000; overflow: hidden; display: flex; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* BANNER INFERIOR */
        footer { 
            height: 90px; 
            background: var(--azul); 
            display: flex; 
            align-items: center; 
            overflow: hidden; 
        }

        .ticker { 
            white-space: nowrap; 
            font-size: 45px; 
            font-weight: bold; 
            color: white;
            animation: move 25s linear infinite; 
        }

        @keyframes move { 
            0% { transform: translateX(100%); } 
            100% { transform: translateX(-120%); } 
        }

        /* BOTÓN DE INICIO (Solo para la primera vez o si se traba) */
        #play-btn {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: white;
            display: flex; justify-content: center; align-items: center;
            z-index: 999; font-size: 40px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="play-btn">TOCA LA PANTALLA PARA INICIAR</div>

    <div id="main-container">
        <header>
            <div id="clock">00:00</div>
            <div id="weather">San Miguel <br> <span id="temp">--°C</span></div>
        </header>

        <div id="video-wrapper">
            <video id="player" muted playsinline></video>
        </div>

        <footer>
            <div class="ticker">
                +++ ÓPTICA CRISTAL SAN MIGUEL +++ LAS MEJORES MARCAS +++ EXAMEN VISUAL +++ LENTES DE CONTACTO +++
            </div>
        </footer>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxpYBcuSBJCkmCq6FPluaCZaTA0ESezmi_rndYNyMCXID9bDYkscZkRlCC9fl5VJmqf1A/exec';
        let videoList = [];
        let currentIndex = 0;
        const player = document.getElementById('player');
        const playBtn = document.getElementById('play-btn');

        // Quitar el cartel de inicio al tocar
        playBtn.onclick = () => {
            playBtn.style.display = 'none';
            if (videoList.length > 0) reproducir();
        };

        async function cargarVideos() {
            try {
                const res = await fetch(SCRIPT_URL);
                videoList = await res.json();
                console.log("Videos:", videoList);
                // Si ya tocamos el botón, arranca
                if (playBtn.style.display === 'none') reproducir();
            } catch (e) { setTimeout(cargarVideos, 5000); }
        }

        function reproducir() {
            if (videoList.length === 0) return;
            const id = videoList[currentIndex];
            player.src = `https://drive.google.com/uc?export=download&id=${id}`;
            player.play().catch(console.error);
            currentIndex = (currentIndex + 1) % videoList.length;
        }

        player.onended = () => {
            if (currentIndex === 0) cargarVideos(); 
            else reproducir();
        };

        // Reloj
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('es-AR', {hour: '2-digit', minute:'2-digit', hour12: false});
        }, 1000);

        // Clima
        async function getWeather() {
            try {
                const res = await fetch('https://wttr.in/San+Miguel,Argentina?format=%t');
                document.getElementById('temp').innerText = await res.text();
            } catch (e) { }
        }

        window.onload = () => {
            cargarVideos();
            getWeather();
            setInterval(getWeather, 900000);
        };
    </script>
</body>
</html>
